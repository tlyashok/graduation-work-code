{% extends "base.html" %}
{% block title %}Вход — FilmRec{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-10">
        <div class="text-center mb-6">
            <span class="text-2xl font-bold text-primary">FilmRec</span>
        </div>

        <div class="flex border-b border-[#E0E0E0] mb-6">
            <a href="/login" class="flex-1 text-center pb-3 text-sm font-semibold text-primary border-b-2 border-primary">Вход</a>
            <a href="/register" class="flex-1 text-center pb-3 text-sm font-semibold text-[#888] hover:text-primary transition">Регистрация</a>
        </div>

        {% if error %}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#888]"></span>
                    <input type="email" name="email" placeholder="example@mail.ru" required
                           class="w-full pl-4 pr-4 py-2.5 border border-[#E0E0E0] rounded-lg focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Пароль</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#888]"></span>
                    <input type="password" name="password" placeholder="Минимум 8 символов" required
                           class="w-full pl-4 pr-4 py-2.5 border border-[#E0E0E0] rounded-lg focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition">
                </div>
            </div>
            <button type="submit" class="w-full py-2.5 bg-primary text-white font-semibold rounded-lg hover:bg-primary/90 transition">Войти</button>
        </form>

        <div class="flex items-center my-6">
            <div class="flex-1 h-px bg-[#E0E0E0]"></div>
            <span class="px-3 text-sm text-[#888]">или</span>
            <div class="flex-1 h-px bg-[#E0E0E0]"></div>
        </div>

        <div class="flex gap-3">
            <a href="/auth/google" class="flex-1 flex items-center justify-center gap-2 py-2.5 border border-[#E0E0E0] rounded-lg text-sm font-medium hover:bg-gray-50 transition">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Google
            </a>
            <a href="/auth/github" class="flex-1 flex items-center justify-center gap-2 py-2.5 bg-[#24292e] text-white rounded-lg text-sm font-medium hover:bg-[#2f363d] transition">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                GitHub
            </a>
        </div>

        <p class="text-center text-sm text-[#888] mt-6">Нет аккаунта? <a href="/register" class="text-primary hover:underline font-medium">Зарегистрироваться</a></p>
    </div>
</div>
{% endblock %}
