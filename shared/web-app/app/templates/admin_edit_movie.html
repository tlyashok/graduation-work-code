{% extends "base.html" %}
{% block title %}Редактирование — {{ movie.title }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">Редактирование фильма</h1>
    <form method="post" action="/admin/movie/edit/{{ movie.movie_id }}" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">Название</label>
            <input type="text" name="title" value="{{ movie.title }}" required
                   class="w-full px-4 py-2 border border-[#E0E0E0] rounded-lg focus:border-primary focus:outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Год</label>
            <input type="number" name="year" value="{{ movie.year or '' }}"
                   class="w-full px-4 py-2 border border-[#E0E0E0] rounded-lg focus:border-primary focus:outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Описание</label>
            <textarea name="description" rows="5"
                      class="w-full px-4 py-2 border border-[#E0E0E0] rounded-lg focus:border-primary focus:outline-none">{{ movie.description or '' }}</textarea>
        </div>
        <div class="flex gap-3">
            <button type="submit" class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition">Сохранить</button>
            <a href="/admin/?tab=movies" class="px-6 py-2 border border-[#E0E0E0] rounded-lg hover:bg-gray-100 transition">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
