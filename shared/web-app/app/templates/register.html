{% extends "base.html" %}
{% block title %}Регистрация — FilmRec{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-10">
        <div class="text-center mb-6">
            <span class="text-2xl font-bold text-primary">FilmRec</span>
        </div>

        <div class="flex border-b border-[#E0E0E0] mb-6">
            <a href="/login" class="flex-1 text-center pb-3 text-sm font-semibold text-[#888] hover:text-primary transition">Вход</a>
            <a href="/register" class="flex-1 text-center pb-3 text-sm font-semibold text-primary border-b-2 border-primary">Регистрация</a>
        </div>

        {% if error %}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg">{{ error }}</div>
        {% endif %}

        <form method="post" action="/register" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Имя</label>
                <input type="text" name="username" placeholder="Ваше имя" required
                       class="w-full px-4 py-2.5 border border-[#E0E0E0] rounded-lg focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#888]"></span>
                    <input type="email" name="email" placeholder="example@mail.ru" required
                           class="w-full pl-4 pr-4 py-2.5 border border-[#E0E0E0] rounded-lg focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Пароль</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[#888]"></span>
                    <input type="password" name="password" placeholder="Минимум 8 символов" required minlength="8"
                           class="w-full pl-4 pr-4 py-2.5 border border-[#E0E0E0] rounded-lg focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition">
                </div>
            </div>
            <button type="submit" class="w-full py-2.5 bg-primary text-white font-semibold rounded-lg hover:bg-primary/90 transition">Зарегистрироваться</button>
        </form>

        <p class="text-center text-sm text-[#888] mt-6">Уже есть аккаунт? <a href="/login" class="text-primary hover:underline font-medium">Войти</a></p>
    </div>
</div>
{% endblock %}
