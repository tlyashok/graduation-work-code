# Rec-service: Go (Gin + pgxpool, пул 10)
# Итерация 1, §2.5.

services:
  rec-service:
    build: ../../../services/1-async-pooling/go
    image: rec-service-go-iter1
    env_file: ../.env
    environment:
      GOMAXPROCS: "1"
    ports:
      - "${PORT_REC}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "${REC_CPUS}"
          memory: ${REC_MEMORY}
