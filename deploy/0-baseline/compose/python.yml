# Rec-service: Python (FastAPI + psycopg2, синхронный, пул 5 соединений)

services:
  rec-service:
    build: ../../../services/0-baseline/python
    env_file: ../.env
    ports:
      - "${PORT_REC}:8000"
    cap_add:
      - SYS_PTRACE       # для py-spy (§3.1.7)
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "${REC_CPUS}"
          memory: ${REC_MEMORY}
